name: reflect
description: Reflect — an encrypted, offline-first journal with full-text search and mood analytics.
version: 1.3.0+4
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Charts
  fl_chart: ^0.69.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  path_provider: ^2.1.3

  # Direct platform deps — di.dart constructs the implementations
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  share_plus: ^10.0.0
  file_picker: ^10.1.9

  # Photo attachments — picked photos are downscaled (image, in an isolate)
  # and stored encrypted, one file per photo
  image_picker: ^1.1.2
  image: ^4.3.0

  # Daily writing reminder
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  flutter_timezone: ^4.0.0

  # Year in Review PDF export
  pdf: ^3.12.0

  # Full CommonMark rendering: MarkdownBody in the entry view, the raw
  # markdown AST for the PDF exporter, and tappable links.
  flutter_markdown: ^0.7.4
  markdown: ^7.2.1
  url_launcher: ^6.3.0

  # Core packages
  core_crypto:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_crypto
      ref: f17e8e14194af3c69868155c58e2439fc796c235
  core_storage:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_storage
      ref: f17e8e14194af3c69868155c58e2439fc796c235
  core_security:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_security
      ref: f17e8e14194af3c69868155c58e2439fc796c235
  core_theme:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_theme
      ref: f17e8e14194af3c69868155c58e2439fc796c235
  core_ui:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_ui
      ref: f17e8e14194af3c69868155c58e2439fc796c235
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#7C3AED"
  adaptive_icon_foreground: assets/icon/icon_foreground.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    # Monochrome emoji font, used only as a PDF font fallback and loaded as
    # raw bytes (rootBundle) — never registered as a UI font family.
    - assets/fonts/NotoEmoji-Regular.ttf
